<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Chat Proto</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        display: grid;
        min-height: 100vh;
        place-items: center;
        background: #ffffff;
      }

      .mobile-screen {
        position: relative;
        overflow: hidden;
        display: grid;
        grid-template-rows: minmax(0, 1fr) 56px;
        width: 320px;
        height: 640px;
        background: #000000;
        border-radius: 32px;
      }

      .tab-panel {
        position: relative;
        grid-row: 1;
        min-height: 0;
        overflow: hidden;
        display: none;
      }

      .tab-panel.is-active {
        display: block;
      }

      .carousel {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        cursor: grab;
        touch-action: pan-y;
        user-select: none;
      }

      .bottom-tabs {
        position: relative;
        grid-row: 2;
        z-index: 8;
        display: grid;
        grid-template-columns: 1fr 1fr;
        height: 56px;
        border-top: 1px solid #e8e8e8;
        background: #ffffff;
        padding: 5px 18px 7px;
      }

      .bottom-tab {
        display: grid;
        grid-template-rows: 18px auto;
        place-items: center;
        gap: 2px;
        min-height: 42px;
        border: 0;
        border-radius: 10px;
        background: transparent;
        color: #777777;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 900;
        line-height: 1.1;
        cursor: pointer;
      }

      .bottom-tab.is-active {
        background: transparent;
        color: #171717;
      }

      .bottom-tab svg {
        width: 18px;
        height: 18px;
        fill: none;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 2;
      }

      .carousel.is-dragging {
        cursor: grabbing;
      }

      .track {
        display: flex;
        width: 100%;
        height: 100%;
        transform: translate3d(0, 0, 0);
        transition: transform 220ms ease;
        will-change: transform;
      }

      .carousel.is-dragging .track {
        transition: none;
      }

      .slide {
        position: relative;
        overflow: hidden;
        flex: 0 0 100%;
        width: 100%;
        height: 100%;
      }

      .slide > img {
        position: absolute;
        inset: 0;
        z-index: 0;
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none;
        transition:
          top 240ms ease,
          right 240ms ease,
          bottom 240ms ease,
          left 240ms ease,
          width 240ms ease,
          height 240ms ease,
          border-radius 240ms ease,
          transform 240ms ease;
      }

      .slide.is-intro-open > img {
        top: 16px;
        right: 16px;
        bottom: auto;
        left: 16px;
        width: calc(100% - 32px);
        height: 52%;
        border-radius: 22px;
        transform: translateY(-4px);
      }

      .slide::after {
        position: absolute;
        inset: 0;
        content: "";
        background:
          linear-gradient(to bottom, rgba(0, 0, 0, 0.08), transparent 34%),
          linear-gradient(to top, rgba(0, 0, 0, 0.72), transparent 44%);
        pointer-events: none;
        z-index: 1;
      }

      .photo-indicator {
        position: absolute;
        top: 14px;
        right: 16px;
        left: 16px;
        z-index: 4;
        display: grid;
        grid-template-columns: repeat(var(--photo-count), 1fr);
        gap: 5px;
        pointer-events: none;
      }

      .photo-indicator span {
        height: 3px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.26);
      }

      .photo-indicator span.is-active {
        background: #ffffff;
      }

      .gesture-hint {
        position: absolute;
        top: 50%;
        left: 50%;
        z-index: 2;
        width: min(248px, calc(100% - 44px));
        padding: 14px 16px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 18px;
        background: rgba(0, 0, 0, 0.46);
        color: #ffffff;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 700;
        line-height: 1.55;
        text-align: center;
        opacity: 1;
        pointer-events: none;
        transform: translate(-50%, -50%);
        transition:
          opacity 180ms ease,
          transform 180ms ease;
      }

      .gesture-hint.is-hidden {
        opacity: 0;
        transform: translate(-50%, -46%);
      }

      .profile {
        position: absolute;
        right: 16px;
        bottom: 26px;
        left: 16px;
        z-index: 4;
        display: grid;
        grid-template-columns: 40px minmax(0, 1fr);
        align-items: end;
        column-gap: 12px;
        row-gap: 12px;
        color: #ffffff;
        pointer-events: none;
        transition: bottom 240ms ease;
      }

      .slide.is-intro-open .profile {
        bottom: calc(43% + 14px);
      }

      .profile-avatar {
        width: 40px;
        height: 40px;
        flex: 0 0 auto;
        border: 2px solid rgba(255, 255, 255, 0.88);
        border-radius: 50%;
        object-fit: cover;
      }

      .slide .profile-avatar {
        width: 40px;
        height: 40px;
      }

      .profile-copy {
        min-width: 0;
      }

      .profile-name {
        display: block;
        overflow: hidden;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        font-size: 16px;
        font-weight: 800;
        line-height: 1.15;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .profile-greeting {
        display: block;
        overflow: hidden;
        margin-top: 4px;
        color: rgba(255, 255, 255, 0.86);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 600;
        line-height: 1.35;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .profile-actions {
        display: grid;
        grid-column: 1 / -1;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        pointer-events: auto;
      }

      .profile-button {
        min-height: 38px;
        border: 1px solid rgba(255, 255, 255, 0.34);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.16);
        color: #ffffff;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        font-size: 13px;
        font-weight: 800;
        backdrop-filter: blur(12px);
        cursor: pointer;
      }

      .profile-button.primary {
        border-color: #ffffff;
        background: #ffffff;
        color: #111111;
      }

      .intro-panel {
        position: absolute;
        right: 0;
        bottom: 0;
        left: 0;
        z-index: 3;
        min-height: 43%;
        max-height: 47%;
        overflow-y: auto;
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
        padding: 24px 20px 20px;
        border-radius: 26px 26px 0 0;
        background: #ffffff;
        color: #161616;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        pointer-events: auto;
        cursor: grab;
        touch-action: none;
        transform: translateY(100%);
        transition: transform 240ms ease;
      }

      .slide.is-intro-open .intro-panel {
        transform: translateY(0);
      }

      .intro-panel.is-drag-scrolling {
        cursor: grabbing;
        user-select: none;
      }

      .intro-kicker {
        display: block;
        color: #8a6a18;
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .intro-title {
        margin: 6px 0 10px;
        font-size: 20px;
        line-height: 1.2;
      }

      .intro-details {
        display: grid;
        gap: 0;
        margin: 0;
      }

      .intro-detail {
        display: grid;
        grid-template-columns: 76px minmax(0, 1fr);
        gap: 10px;
        padding: 9px 0;
        border-top: 1px solid #eeeeee;
      }

      .intro-detail:first-child {
        border-top: 0;
        padding-top: 0;
      }

      .intro-detail dt {
        color: #8a6a18;
        font-size: 11px;
        font-weight: 900;
        line-height: 1.45;
      }

      .intro-detail dd {
        margin: 0;
        color: #444444;
        font-size: 12px;
        font-weight: 650;
        line-height: 1.55;
      }

      .chat-list {
        overflow: hidden;
        background: #f5f5f5;
        color: #171717;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      .chat-list-inner {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        height: 100%;
        min-height: 0;
      }

      .chat-list-header {
        border-bottom: 1px solid #e2e2e2;
        background: #ffffff;
        padding: 20px 18px 14px;
      }

      .chat-list-title {
        margin: 0;
        font-size: 22px;
        line-height: 1.2;
      }

      .chat-list-subtitle {
        margin: 5px 0 0;
        color: #6f6f6f;
        font-size: 12px;
        font-weight: 700;
      }

      .chat-list-items {
        overflow-y: auto;
        padding: 10px 10px 18px;
      }

      .chat-empty {
        display: grid;
        place-items: center;
        min-height: 100%;
        padding: 28px;
        color: #777777;
        font-size: 13px;
        font-weight: 700;
        line-height: 1.55;
        text-align: center;
      }

      .chat-list-item {
        display: grid;
        grid-template-columns: 46px minmax(0, 1fr);
        gap: 12px;
        width: 100%;
        min-height: 70px;
        border: 0;
        border-radius: 16px;
        background: #ffffff;
        padding: 12px;
        color: #171717;
        cursor: pointer;
        text-align: left;
      }

      .chat-list-item + .chat-list-item {
        margin-top: 8px;
      }

      .chat-list-avatar {
        width: 46px;
        height: 46px;
        border-radius: 50%;
        object-fit: cover;
      }

      .chat-list-copy {
        min-width: 0;
      }

      .chat-list-row {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 10px;
      }

      .chat-list-name {
        overflow: hidden;
        font-size: 14px;
        font-weight: 900;
        line-height: 1.25;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .chat-list-time {
        flex: 0 0 auto;
        color: #8c8c8c;
        font-size: 10px;
        font-weight: 800;
      }

      .chat-list-preview {
        overflow: hidden;
        margin: 4px 0 0;
        color: #6a6a6a;
        font-size: 12px;
        font-weight: 700;
        line-height: 1.35;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .chat-room {
        position: absolute;
        inset: 0;
        z-index: 10;
        display: none;
        grid-template-rows: auto minmax(0, 1fr) auto;
        background: #f5f5f5;
        color: #171717;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      .mobile-screen.is-chatting .carousel {
        display: none;
      }

      .mobile-screen.is-chatting .chat-list,
      .mobile-screen.is-chatting .bottom-tabs {
        display: none;
      }

      .mobile-screen.is-chatting .chat-room {
        display: grid;
      }

      .chat-header {
        display: grid;
        grid-template-columns: 44px 40px minmax(0, 1fr);
        align-items: center;
        gap: 10px;
        min-height: 70px;
        border-bottom: 1px solid #e2e2e2;
        background: #ffffff;
        padding: 12px 14px;
      }

      .chat-back {
        display: grid;
        place-items: center;
        width: 44px;
        height: 44px;
        border: 0;
        border-radius: 50%;
        background: transparent;
        color: #171717;
        cursor: pointer;
      }

      .chat-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        object-fit: cover;
      }

      .chat-title {
        min-width: 0;
      }

      .chat-name {
        display: block;
        overflow: hidden;
        font-size: 15px;
        font-weight: 900;
        line-height: 1.2;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .chat-status {
        display: block;
        margin-top: 2px;
        color: #6f6f6f;
        font-size: 11px;
        font-weight: 700;
      }

      .chat-messages {
        display: flex;
        flex-direction: column;
        gap: 10px;
        overflow-y: auto;
        padding: 16px 14px;
      }

      .chat-message {
        display: flex;
        max-width: 82%;
      }

      .chat-message.is-user {
        align-self: flex-end;
      }

      .chat-message:not(.is-user) {
        align-self: flex-start;
      }

      .chat-bubble {
        border-radius: 18px;
        padding: 10px 12px;
        font-size: 13px;
        font-weight: 600;
        line-height: 1.45;
      }

      .chat-message:not(.is-user) .chat-bubble {
        border-top-left-radius: 6px;
        background: #ffffff;
        color: #202020;
      }

      .chat-message.is-user .chat-bubble {
        border-top-right-radius: 6px;
        background: #171717;
        color: #ffffff;
      }

      .chat-composer {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 44px;
        gap: 8px;
        border-top: 1px solid #e2e2e2;
        background: #ffffff;
        padding: 10px 12px 16px;
      }

      .chat-input {
        min-width: 0;
        min-height: 44px;
        border: 1px solid #dddddd;
        border-radius: 999px;
        background: #f7f7f7;
        padding: 0 15px;
        color: #171717;
        font: inherit;
        font-size: 13px;
        font-weight: 600;
      }

      .chat-send {
        display: grid;
        place-items: center;
        width: 44px;
        height: 44px;
        border: 0;
        border-radius: 50%;
        background: #171717;
        color: #ffffff;
        cursor: pointer;
      }

      .chat-back:focus-visible,
      .chat-input:focus-visible,
      .chat-send:focus-visible,
      .chat-list-item:focus-visible,
      .bottom-tab:focus-visible,
      .profile-button:focus-visible {
        outline: 3px solid #4d8dff;
        outline-offset: 2px;
      }

      .chat-back svg,
      .chat-send svg {
        width: 18px;
        height: 18px;
        fill: none;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 2;
      }

      @media (max-width: 380px), (max-height: 700px) {
        .mobile-screen {
          width: min(84vw, 320px);
          height: min(78vh, 640px);
        }
      }

    </style>
  </head>
  <body>
    <main class="mobile-screen" aria-label="모바일 사진 스와이프 프로토타입">
      <section
        class="carousel tab-panel is-active"
        data-tab-panel="friends"
        aria-label="친구찾기"
      >
        <div class="track"></div>
        <div class="gesture-hint" aria-hidden="true">
          좌우 클릭으로 사진 전환<br />
          스와이프로 아이돌 전환
        </div>
      </section>
      <section class="chat-list tab-panel" data-tab-panel="chats" aria-label="채팅 목록">
        <div class="chat-list-inner">
          <header class="chat-list-header">
            <h1 class="chat-list-title">채팅</h1>
            <p class="chat-list-subtitle">채팅을 시작한 아이돌이 여기에 표시됩니다.</p>
          </header>
          <div class="chat-list-items"></div>
        </div>
      </section>
      <nav class="bottom-tabs" aria-label="하단 탭">
        <button
          class="bottom-tab is-active"
          data-tab="friends"
          type="button"
          aria-pressed="true"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M16 11a4 4 0 1 0-8 0" />
            <path d="M4 21a8 8 0 0 1 16 0" />
          </svg>
          <span>친구찾기</span>
        </button>
        <button
          class="bottom-tab"
          data-tab="chats"
          type="button"
          aria-pressed="false"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4Z" />
          </svg>
          <span>채팅</span>
        </button>
      </nav>
      <section class="chat-room" aria-label="채팅방">
        <header class="chat-header">
          <button class="chat-back" type="button" aria-label="채팅 목록으로 돌아가기">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m15 18-6-6 6-6" />
            </svg>
          </button>
          <img class="chat-avatar" alt="" draggable="false" />
          <div class="chat-title">
            <span class="chat-name"></span>
            <span class="chat-status">지금 대화 가능</span>
          </div>
        </header>
        <div class="chat-messages" aria-live="polite"></div>
        <form class="chat-composer">
          <input
            class="chat-input"
            name="message"
            autocomplete="off"
            placeholder="메시지를 입력하세요"
            type="text"
          />
          <button class="chat-send" type="submit" aria-label="메시지 보내기">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m22 2-7 20-4-9-9-4Z" />
              <path d="M22 2 11 13" />
            </svg>
          </button>
        </form>
      </section>
    </main>

    <script>
      const mobileScreen = document.querySelector(".mobile-screen");
      const carousel = document.querySelector(".carousel");
      const track = document.querySelector(".track");
      const gestureHint = document.querySelector(".gesture-hint");
      const tabPanels = document.querySelectorAll("[data-tab-panel]");

            lifestyle: "연기, 음악, 뷰티, 산책, 조용한 휴식",
          },
          photos: [
            "https://upload.wikimedia.org/wikipedia/commons/2/2e/Jisoo_at_Boyfriend_on_Demand_press_conference_on_26022026_%2812%29.png",

            "https://upload.wikimedia.org/wikipedia/commons/b/ba/Kim_Ji-Soo_in_2020_PUBG_%281%29.png",
            "https://upload.wikimedia.org/wikipedia/commons/4/4f/Kim_Ji-Soo_in_2020_Dior_%281%29.png",
          ],
        },
        {
          name: "Karina",
          greeting: "천천히 넘겨도 괜찮아요.",
          avatar:
            "https://upload.wikimedia.org/wikipedia/commons/thumb/f/fb/Karina_at_Love_Your_W_event_2025.jpg/1280px-Karina_at_Love_Your_W_event_2025.jpg",
          profile: {
            intro:
              "미래적인 이미지와 선명한 퍼포먼스 감각이 잘 드러나는 아티스트입니다.",
            bodyProfile:
              "긴 라인감과 무대 의상에 잘 맞는 또렷한 실루엣을 강조했습니다.",
            job: "가수, 퍼포머, 모델",
            personality:
              "카리스마가 강하지만 가까워지면 다정하고 장난기 있는 무드",
            lifestyle: "댄스, 음악, 게임, 트렌디한 패션, 야간 산책",
          },
          photos: [
            "https://upload.wikimedia.org/wikipedia/commons/thumb/f/fb/Karina_at_Love_Your_W_event_2025.jpg/1280px-Karina_at_Love_Your_W_event_2025.jpg",
            "https://upload.wikimedia.org/wikipedia/commons/1/12/230601_Karina_%28aespa%29.jpg",
            "https://upload.wikimedia.org/wikipedia/commons/5/5e/Aespa_KARINA_Airport_Departure_on_20250226_01.png",
            "https://upload.wikimedia.org/wikipedia/commons/0/08/Aespa_Karina_2024_MMA_2.jpg",
          ],
        },
        {
          name: "Wonyoung",
          greeting: "지금 이 순간, 조금 설레도 괜찮아요.",
          avatar:
            "https://upload.wikimedia.org/wikipedia/commons/thumb/0/07/Jang_Won-young_at_the_Bulgari_Eclettica_event_in_Seoul%2C_May_12%2C_2026_%281%29.png/1280px-Jang_Won-young_at_the_Bulgari_Eclettica_event_in_Seoul%2C_May_12%2C_2026_%281%29.png",
          profile: {
            intro:
              "화사한 표현력과 또렷한 존재감으로 화면을 밝히는 프로필입니다.",
            bodyProfile:
              "길고 곧은 라인과 화보형 포즈가 잘 어울리는 비율감을 보여줍니다.",
            job: "가수, MC, 모델, 브랜드 앰배서더",
            personality:
              "긍정적이고 프로페셔널하며, 말투는 부드럽고 또렷한 편",
            lifestyle: "패션, 뷰티, 촬영, 자기관리, 디저트 카페",
          },
          photos: [
            "https://upload.wikimedia.org/wikipedia/commons/thumb/0/07/Jang_Won-young_at_the_Bulgari_Eclettica_event_in_Seoul%2C_May_12%2C_2026_%281%29.png/1280px-Jang_Won-young_at_the_Bulgari_Eclettica_event_in_Seoul%2C_May_12%2C_2026_%281%29.png",
            "https://upload.wikimedia.org/wikipedia/commons/9/9b/Jang_Won-young_of_Ive%2C_October_15%2C_2025_%282%29.png",
            "https://upload.wikimedia.org/wikipedia/commons/4/42/Jang_Won-young_of_Ive%2C_October_15%2C_2025.png",
            "https://upload.wikimedia.org/wikipedia/commons/d/d2/JANG_WON_YOUNG_%28%EC%9E%A5%EC%9B%90%EC%98%81%29_%E2%80%93_MIUMIU_PHOTOCALL_%E2%80%93_2025.06.20_%E2%80%93_P1.jpg",
          ],
        },
        {
          name: "Yujin",
          greeting: "가까이 오시면 더 재미있어질 거예요.",
          avatar:
            "https://upload.wikimedia.org/wikipedia/commons/f/f0/IVE_Yujin_2026_GDA.jpg",
          profile: {
            intro:
              "시원한 에너지와 안정적인 리더십이 함께 느껴지는 아티스트입니다.",
            bodyProfile:
              "스포티한 분위기와 건강한 비율감이 잘 살아나는 스타일을 보여줍니다.",
            job: "가수, 방송인, 퍼포머",
            personality:
              "솔직하고 활발하며, 상대를 편하게 만드는 친근한 대화 톤",
            lifestyle: "운동, 예능, 음악, 여행, 캐주얼한 데일리룩",
          },
          photos: [
            "https://upload.wikimedia.org/wikipedia/commons/f/f0/IVE_Yujin_2026_GDA.jpg",
            "https://upload.wikimedia.org/wikipedia/commons/d/d8/An_Yujin_%28%EC%95%88%EC%9C%A0%EC%A7%84%29_IVE_220916.jpg",
            "https://upload.wikimedia.org/wikipedia/commons/8/89/IVE_An_Yujin_in_Marie_Claire_Korea_Feb_23%2C_2023.jpg",
            "https://upload.wikimedia.org/wikipedia/commons/8/86/MMA_2023_IVE_Yujin_1.jpg",
          ],
        },
      ];
      const realSlideCount = idols.length;
      const photoIndexes = idols.map(() => 0);
      const chatHistories = idols.map((idol) => [
        {
          from: "idol",
          text: `안녕하세요. ${idol.name}입니다. 오늘은 어떤 이야기를 나눠볼까요?`,
        },
        {
          from: "user",
          text: "방금 프로필을 보고 왔어요. 분위기가 좋네요.",
        },
        {
          from: "idol",
          text: "그렇게 말해주시니 기분이 좋아요. 천천히 이야기해도 괜찮아요.",
        },
        {
          from: "idol",
          text: "궁금한 게 있으면 편하게 물어봐 주세요.",
        },
      ]);
      let activeChatIndex = 0;
      const startedChatIndexes = [];

      let isDragging = false;
      let startX = 0;
      let currentIndex = 1;
      let currentOffset = 0;
      let dragOffset = 0;
      let activeScrollPanel = null;
      let scrollStartY = 0;
      let scrollStartTop = 0;

      function createSlide(idol, idolIndex) {
        const slide = document.createElement("article");
        slide.className = "slide";
        slide.dataset.idolIndex = idolIndex;
        slide.innerHTML = `
          <img
            class="portrait"
            src="${idol.photos[photoIndexes[idolIndex]]}"
            alt="${idol.name} 인물 사진"
            draggable="false"
          />
          <div
            class="photo-indicator"
            style="--photo-count: ${idol.photos.length}"
            aria-label="${idol.name} 사진 위치"
          >
            ${idol.photos
              .map(
                (_, photoIndex) =>
                  `<span class="${photoIndex === photoIndexes[idolIndex] ? "is-active" : ""}"></span>`,
              )
              .join("")}
          </div>
          <div class="profile" aria-label="${idol.name} 프로필">
            <img
              class="profile-avatar"
              src="${idol.avatar}"
              alt=""
              draggable="false"
            />
            <div class="profile-copy">
              <span class="profile-name">${idol.name}</span>
              <span class="profile-greeting">${idol.greeting}</span>
            </div>
            <div class="profile-actions" aria-label="${idol.name} 액션">
              <button class="profile-button primary" data-action="chat" type="button">채팅하기</button>
              <button class="profile-button" data-action="intro" type="button">소개보기</button>
            </div>
          </div>
          <section class="intro-panel" aria-label="${idol.name} 소개">
            <span class="intro-kicker">Profile</span>
            <h2 class="intro-title">${idol.name}</h2>
            <dl class="intro-details">
              <div class="intro-detail">
                <dt>이름</dt>
                <dd>${idol.name}</dd>
              </div>
              <div class="intro-detail">
                <dt>소개</dt>
                <dd>${idol.profile.intro}</dd>
              </div>
              <div class="intro-detail">
                <dt>신체프로필</dt>
                <dd>${idol.profile.bodyProfile}</dd>
              </div>
              <div class="intro-detail">
                <dt>직업</dt>
                <dd>${idol.profile.job}</dd>
              </div>
              <div class="intro-detail">
                <dt>성격</dt>
                <dd>${idol.profile.personality}</dd>
              </div>
              <div class="intro-detail">
                <dt>라이프스타일<br />관심사</dt>
                <dd>${idol.profile.lifestyle}</dd>
              </div>
            </dl>
          </section>
        `;
        return slide;
      }

      function updatePhoto(idolIndex) {
        const idol = idols[idolIndex];
        const photo = idol.photos[photoIndexes[idolIndex]];
        const slides = track.querySelectorAll(`[data-idol-index="${idolIndex}"]`);

        slides.forEach((slide) => {
          const portrait = slide.querySelector(".portrait");
          const indicatorBars = slide.querySelectorAll(".photo-indicator span");
          portrait.src = photo;
          portrait.alt = `${idol.name} 인물 사진`;
          indicatorBars.forEach((bar, index) => {
            bar.classList.toggle("is-active", index === photoIndexes[idolIndex]);
          });
        });
      }

      function changeCurrentPhoto(direction) {
        const realIndex = getRealIndex();
        const photos = idols[realIndex].photos;
        photoIndexes[realIndex] =
          (photoIndexes[realIndex] + direction + photos.length) % photos.length;
        updatePhoto(realIndex);
      }

      function hideGestureHint() {
        gestureHint.classList.add("is-hidden");
      }

      function setActiveTab(tabName) {
        tabPanels.forEach((panel) => {
          panel.classList.toggle("is-active", panel.dataset.tabPanel === tabName);
        });

        bottomTabs.forEach((tab) => {
          const isActive = tab.dataset.tab === tabName;
          tab.classList.toggle("is-active", isActive);
          tab.setAttribute("aria-pressed", String(isActive));
        });

        if (tabName === "chats") {
          renderChatList();
        }
      }

      function markChatStarted(idolIndex) {
        const previousIndex = startedChatIndexes.indexOf(idolIndex);

        if (previousIndex !== -1) {
          startedChatIndexes.splice(previousIndex, 1);
        }

        startedChatIndexes.unshift(idolIndex);
      }

      function getLastMessage(idolIndex) {
        const history = chatHistories[idolIndex];
        return history[history.length - 1];
      }

      function renderChatList() {
        chatListItems.replaceChildren();

        if (startedChatIndexes.length === 0) {
          const empty = document.createElement("div");
          empty.className = "chat-empty";
          empty.textContent =
            "아직 시작된 채팅이 없습니다. 친구찾기에서 채팅하기를 눌러보세요.";
          chatListItems.appendChild(empty);
          return;
        }

        startedChatIndexes.forEach((idolIndex) => {
          const idol = idols[idolIndex];
          const lastMessage = getLastMessage(idolIndex);
          const item = document.createElement("button");
          const avatar = document.createElement("img");
          const copy = document.createElement("span");
          const row = document.createElement("span");
          const name = document.createElement("span");
          const time = document.createElement("span");
          const preview = document.createElement("span");

          item.className = "chat-list-item";
          item.type = "button";
          item.dataset.idolIndex = String(idolIndex);
          avatar.className = "chat-list-avatar";
          avatar.src = idol.avatar;
          avatar.alt = "";
          avatar.draggable = false;
          copy.className = "chat-list-copy";
          row.className = "chat-list-row";
          name.className = "chat-list-name";
          name.textContent = idol.name;
          time.className = "chat-list-time";
          time.textContent = "방금";
          preview.className = "chat-list-preview";
          preview.textContent = lastMessage.text;

          row.append(name, time);
          copy.append(row, preview);
          item.append(avatar, copy);
          chatListItems.appendChild(item);
        });
      }

      function appendMessage(message) {
        const item = document.createElement("div");
        item.className = `chat-message ${
          message.from === "user" ? "is-user" : ""
        }`;

        const bubble = document.createElement("div");
        bubble.className = "chat-bubble";
        bubble.textContent = message.text;
        item.appendChild(bubble);
        chatMessages.appendChild(item);
      }

      function renderChat(idolIndex) {
        const idol = idols[idolIndex];
        chatAvatar.src = idol.avatar;
        chatName.textContent = idol.name;
        chatMessages.replaceChildren();
        chatHistories[idolIndex].forEach(appendMessage);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      function openChat(idolIndex) {
        activeChatIndex = idolIndex;
        markChatStarted(idolIndex);
        closeIntroPanels();
        setActiveTab("chats");
        renderChat(idolIndex);
        mobileScreen.classList.add("is-chatting");
        chatInput.focus();
      }

      function closeChat() {
        mobileScreen.classList.remove("is-chatting");
        chatInput.value = "";
        setActiveTab("chats");
      }

      function closeIntroPanels() {
        track.querySelectorAll(".slide").forEach((slide) => {
          slide.classList.remove("is-intro-open");
          const introButton = slide.querySelector('[data-action="intro"]');

          if (introButton) {
            introButton.textContent = "소개보기";
          }
        });
      }

      function setIntroOpen(idolIndex, isOpen) {
        track.querySelectorAll(".slide").forEach((slide) => {
          const shouldOpen =
            Number(slide.dataset.idolIndex) === idolIndex && isOpen;
          slide.classList.toggle("is-intro-open", shouldOpen);

          const introButton = slide.querySelector('[data-action="intro"]');

          if (introButton) {
            introButton.textContent = shouldOpen ? "소개닫기" : "소개보기";
          }
        });
      }

      track.addEventListener("pointerdown", (event) => {
        if (event.target.closest(".profile-button, .intro-panel")) {
          hideGestureHint();
          event.stopPropagation();
        }
      });

      track.addEventListener("pointerdown", (event) => {
        const introPanel = event.target.closest(".intro-panel");

        if (!introPanel || event.button > 0) return;

        activeScrollPanel = introPanel;
        scrollStartY = event.clientY;
        scrollStartTop = introPanel.scrollTop;
        introPanel.classList.add("is-drag-scrolling");
        introPanel.setPointerCapture(event.pointerId);
        event.stopPropagation();
      });

      track.addEventListener("pointermove", (event) => {
        if (!activeScrollPanel) return;

        event.preventDefault();
        event.stopPropagation();
        activeScrollPanel.scrollTop = scrollStartTop - (event.clientY - scrollStartY);
      });

      function stopIntroPanelScroll(event) {
        if (!activeScrollPanel) return;

        activeScrollPanel.classList.remove("is-drag-scrolling");

        if (activeScrollPanel.hasPointerCapture(event.pointerId)) {
          activeScrollPanel.releasePointerCapture(event.pointerId);
        }

        activeScrollPanel = null;
        event.stopPropagation();
      }

      track.addEventListener("click", (event) => {
        const button = event.target.closest(".profile-button");

        if (!button) return;

        event.stopPropagation();

        const slide = button.closest(".slide");
        const idolIndex = Number(slide.dataset.idolIndex);

        if (button.dataset.action === "chat") {
          openChat(idolIndex);
          return;
        }

        if (button.dataset.action !== "intro") return;

        const willOpen = !slide.classList.contains("is-intro-open");
        setIntroOpen(idolIndex, willOpen);
      });

      bottomTabs.forEach((tab) => {
        tab.addEventListener("click", () => {
          mobileScreen.classList.remove("is-chatting");
          closeIntroPanels();
          setActiveTab(tab.dataset.tab);
        });
      });

      chatListItems.addEventListener("click", (event) => {
        const item = event.target.closest(".chat-list-item");

        if (!item) return;

        openChat(Number(item.dataset.idolIndex));
      });

      function buildSlides() {
        idols.forEach((idol, index) => track.appendChild(createSlide(idol, index)));

        const slides = Array.from(track.children);
        const firstClone = slides[0].cloneNode(true);
        const lastClone = slides[slides.length - 1].cloneNode(true);

        firstClone.setAttribute("aria-hidden", "true");
        lastClone.setAttribute("aria-hidden", "true");
        track.insertBefore(lastClone, slides[0]);
        track.appendChild(firstClone);
      }

      function moveTrack(offset) {
        track.style.transform = `translate3d(${offset}px, 0, 0)`;
      }

      function getRealIndex() {
        if (currentIndex === 0) return realSlideCount - 1;
        if (currentIndex === realSlideCount + 1) return 0;
        return currentIndex - 1;
      }

      function jumpTo(index) {
        track.style.transition = "none";
        currentIndex = index;
        currentOffset = -currentIndex * carousel.clientWidth;
        dragOffset = currentOffset;
        moveTrack(currentOffset);
        track.getBoundingClientRect();
        track.style.transition = "";
      }

      function slideTo(index) {
        currentIndex = index;
        currentOffset = -currentIndex * carousel.clientWidth;
        dragOffset = currentOffset;
        moveTrack(currentOffset);
      }

      function normalizeLoopPosition() {
        if (currentIndex === 0) {
          jumpTo(realSlideCount);
        }

        if (currentIndex === realSlideCount + 1) {
          jumpTo(1);
        }
      }

      buildSlides();
      jumpTo(currentIndex);
      renderChatList();

      carousel.addEventListener("pointerdown", (event) => {
        isDragging = true;
        startX = event.clientX;
        dragOffset = currentOffset;
        hideGestureHint();
        carousel.classList.add("is-dragging");
        carousel.setPointerCapture(event.pointerId);
      });

      carousel.addEventListener("pointermove", (event) => {
        if (!isDragging) return;
        event.preventDefault();
        const distance = event.clientX - startX;
        dragOffset = currentOffset + distance;
        moveTrack(dragOffset);
      });

      function stopDragging(event) {
        if (!isDragging) return;

        isDragging = false;
        carousel.classList.remove("is-dragging");

        const distance = event.clientX - startX;
        const clickThreshold = 8;
        const swipeThreshold = 28;

        if (Math.abs(distance) <= clickThreshold) {
          const rect = carousel.getBoundingClientRect();
          const direction = event.clientX < rect.left + rect.width / 2 ? -1 : 1;
          slideTo(currentIndex);
          changeCurrentPhoto(direction);
        } else if (Math.abs(distance) > swipeThreshold) {
          const targetIndex = distance < 0 ? currentIndex + 1 : currentIndex - 1;
          closeIntroPanels();
          slideTo(targetIndex);
        } else {
          slideTo(currentIndex);
        }

        if (carousel.hasPointerCapture(event.pointerId)) {
          carousel.releasePointerCapture(event.pointerId);
        }
      }

      track.addEventListener("transitionend", (event) => {
        if (event.propertyName === "transform") {
          normalizeLoopPosition();
        }
      });
      track.addEventListener("pointerup", stopIntroPanelScroll);
      track.addEventListener("pointercancel", stopIntroPanelScroll);

      carousel.addEventListener("pointerup", stopDragging);
      carousel.addEventListener("pointercancel", stopDragging);
      carousel.addEventListener("pointerleave", stopDragging);
      chatBack.addEventListener("click", closeChat);
      chatComposer.addEventListener("submit", (event) => {
        event.preventDefault();

        const text = chatInput.value.trim();

        if (!text) return;

        const message = { from: "user", text };
        chatHistories[activeChatIndex].push(message);
        appendMessage(message);
        chatInput.value = "";
        chatMessages.scrollTop = chatMessages.scrollHeight;
        renderChatList();
      });
      window.addEventListener("resize", () => {
        normalizeLoopPosition();
        jumpTo(currentIndex);
      });
    </script>
  </body>
</html>
