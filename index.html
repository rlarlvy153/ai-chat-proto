<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Chat Proto</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="mobile-screen" aria-label="모바일 사진 스와이프 프로토타입">
      <section
        class="carousel tab-panel is-active"
        data-tab-panel="friends"
        aria-label="친구찾기"
      >
        <div class="track"></div>
        <div class="gesture-hint" aria-hidden="true">스와이프로 인물 전환</div>
      </section>
      <section class="chat-list tab-panel" data-tab-panel="chats" aria-label="채팅 목록">
        <div class="chat-list-inner">
          <header class="chat-list-header">
            <h1 class="chat-list-title">채팅</h1>
            <p class="chat-list-subtitle">채팅을 시작한 인물이 여기에 표시됩니다.</p>
          </header>
          <div class="chat-list-items"></div>
        </div>
      </section>
      <nav class="bottom-tabs" aria-label="하단 탭">
        <button
          class="bottom-tab is-active"
          data-tab="friends"
          type="button"
          aria-pressed="true"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M16 11a4 4 0 1 0-8 0" />
            <path d="M4 21a8 8 0 0 1 16 0" />
          </svg>
          <span>친구찾기</span>
        </button>
        <button
          class="bottom-tab"
          data-tab="chats"
          type="button"
          aria-pressed="false"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4Z" />
          </svg>
          <span>채팅</span>
        </button>
      </nav>
      <section class="chat-room" aria-label="채팅방">
        <header class="chat-header">
          <button class="chat-back" type="button" aria-label="채팅 목록으로 돌아가기">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m15 18-6-6 6-6" />
            </svg>
          </button>
          <img class="chat-avatar" alt="" draggable="false" />
          <div class="chat-title">
            <span class="chat-name"></span>
            <span class="chat-status">지금 대화 가능</span>
          </div>
        </header>
        <div class="chat-messages" aria-live="polite"></div>
        <form class="chat-composer">
          <input
            class="chat-input"
            name="message"
            autocomplete="off"
            placeholder="메시지를 입력하세요"
            type="text"
          />
          <button class="chat-send" type="submit" aria-label="메시지 보내기">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m22 2-7 20-4-9-9-4Z" />
              <path d="M22 2 11 13" />
            </svg>
          </button>
        </form>
      </section>
    </main>

    <script src="./data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
