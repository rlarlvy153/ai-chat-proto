<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Chat Proto</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        display: grid;
        min-height: 100vh;
        place-items: center;
        background: #ffffff;
      }

      .mobile-screen {
        position: relative;
        overflow: hidden;
        width: 320px;
        height: 640px;
        background: #000000;
        border-radius: 32px;
      }

      .carousel {
        width: 100%;
        height: 100%;
        overflow: hidden;
        cursor: grab;
        touch-action: pan-y;
        user-select: none;
      }

      .carousel.is-dragging {
        cursor: grabbing;
      }

      .track {
        display: flex;
        width: 100%;
        height: 100%;
        transform: translate3d(0, 0, 0);
        transition: transform 220ms ease;
        will-change: transform;
      }

      .carousel.is-dragging .track {
        transition: none;
      }

      .slide {
        position: relative;
        flex: 0 0 100%;
        width: 100%;
        height: 100%;
      }

      .slide img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none;
      }

      .slide::after {
        position: absolute;
        inset: 0;
        content: "";
        background:
          linear-gradient(to bottom, rgba(0, 0, 0, 0.08), transparent 34%),
          linear-gradient(to top, rgba(0, 0, 0, 0.38), transparent 34%);
        pointer-events: none;
      }

      @media (max-width: 380px), (max-height: 700px) {
        .mobile-screen {
          width: min(84vw, 320px);
          height: min(78vh, 640px);
        }
      }
    </style>
  </head>
  <body>
    <main class="mobile-screen" aria-label="모바일 사진 스와이프 프로토타입">
      <section class="carousel" aria-label="사진 캐러셀">
        <div class="track">
          <article class="slide">
            <img
              src="https://upload.wikimedia.org/wikipedia/commons/7/78/Jennie_2026_GDA_1.jpg"
              alt="Jennie 인물 사진"
              draggable="false"
            />
          </article>
          <article class="slide">
            <img
              src="https://upload.wikimedia.org/wikipedia/commons/2/2e/Jisoo_at_Boyfriend_on_Demand_press_conference_on_26022026_%2812%29.png"
              alt="Jisoo 인물 사진"
              draggable="false"
            />
          </article>
          <article class="slide">
            <img
              src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/fb/Karina_at_Love_Your_W_event_2025.jpg/1280px-Karina_at_Love_Your_W_event_2025.jpg"
              alt="Karina 인물 사진"
              draggable="false"
            />
          </article>
          <article class="slide">
            <img
              src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/07/Jang_Won-young_at_the_Bulgari_Eclettica_event_in_Seoul%2C_May_12%2C_2026_%281%29.png/1280px-Jang_Won-young_at_the_Bulgari_Eclettica_event_in_Seoul%2C_May_12%2C_2026_%281%29.png"
              alt="Jang Won-young 인물 사진"
              draggable="false"
            />
          </article>
          <article class="slide">
            <img
              src="https://upload.wikimedia.org/wikipedia/commons/f/f0/IVE_Yujin_2026_GDA.jpg"
              alt="An Yu-jin 인물 사진"
              draggable="false"
            />
          </article>
        </div>
      </section>
    </main>

    <script>
      const carousel = document.querySelector(".carousel");
      const track = document.querySelector(".track");
      let isDragging = false;
      let startX = 0;
      let currentIndex = 0;
      let currentOffset = 0;
      let dragOffset = 0;

      function moveTrack(offset) {
        track.style.transform = `translate3d(${offset}px, 0, 0)`;
      }

      function snapTo(index) {
        const slideCount = track.children.length;
        currentIndex = (index + slideCount) % slideCount;
        currentOffset = -currentIndex * carousel.clientWidth;
        dragOffset = currentOffset;
        moveTrack(currentOffset);
      }

      carousel.addEventListener("pointerdown", (event) => {
        isDragging = true;
        startX = event.clientX;
        dragOffset = currentOffset;
        carousel.classList.add("is-dragging");
        carousel.setPointerCapture(event.pointerId);
      });

      carousel.addEventListener("pointermove", (event) => {
        if (!isDragging) return;
        event.preventDefault();
        const distance = event.clientX - startX;
        dragOffset = currentOffset + distance;
        moveTrack(dragOffset);
      });

      function stopDragging(event) {
        if (!isDragging) return;

        isDragging = false;
        carousel.classList.remove("is-dragging");

        const distance = event.clientX - startX;
        const swipeThreshold = 4;
        let targetIndex = currentIndex;

        if (Math.abs(distance) > swipeThreshold) {
          targetIndex = distance < 0 ? currentIndex + 1 : currentIndex - 1;
        }

        snapTo(targetIndex);

        if (carousel.hasPointerCapture(event.pointerId)) {
          carousel.releasePointerCapture(event.pointerId);
        }
      }

      carousel.addEventListener("pointerup", stopDragging);
      carousel.addEventListener("pointercancel", stopDragging);
      carousel.addEventListener("pointerleave", stopDragging);
      window.addEventListener("resize", () => snapTo(currentIndex));
    </script>
  </body>
</html>
